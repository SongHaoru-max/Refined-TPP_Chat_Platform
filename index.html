<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-RefinedTPP | Refined-TPP Data Collaborative Processing Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 基础美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* 进入平台的平滑过渡 */
        #main-platform {
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .platform-hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden font-sans text-gray-800">

    <div id="welcome-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center transition-all duration-700">
        <div class="absolute w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px] -top-20 -left-20 animate-pulse"></div>
        <div class="absolute w-[400px] h-[400px] bg-indigo-500/10 rounded-full blur-[100px] bottom-0 right-0"></div>

        <div class="relative z-10 w-full max-w-md p-8">
            <div class="text-center mb-10">
                <img src="assets/Logo.png" class="w-20 h-20 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]" alt="Logo">
                <h1 class="text-indigo-4xl tracking-tighter mb-2">
                    <span class=text-indigo-400 font-light italic mr-1">Chat- </span><span class="font-black text-white">RefinedTPP</span>
                </h1>
                <p class="text-slate-400 text-[10px] tracking-[0.3em] uppercase font-bold">Collaborative Data Processing Platform</p>
            </div>

            <div class="bg-white/5 backdrop-blur-2xl border border-white/10 p-8 rounded-[2.5rem] shadow-2xl">
                <h2 class="text-xl font-bold text-white mb-6 flex items-center">
                    <span class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center mr-3 text-sm">
                        <i class="fas fa-user-plus"></i>
                    </span>
                    Initialize Account
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-indigo-300 uppercase mb-1.5 ml-1 tracking-wider">Academic ID / Email</label>
                        <input type="email" placeholder="haoru.song@fudan.edu.cn" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-indigo-500/50 focus:bg-white/10 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-indigo-300 uppercase mb-1.5 ml-1 tracking-wider">Access Password</label>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-indigo-500/50 focus:bg-white/10 outline-none transition-all">
                    </div>
                    
                    <button onclick="enterPlatform()" 
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-900/40 transition-all transform hover:-translate-y-1 active:scale-[0.98] mt-4 flex items-center justify-center group">
                        Enter Platform 
                        <i class="fas fa-chevron-right ml-2 text-indigo-300 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>

                <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center text-[10px] text-slate-500 font-medium">
                    <span><i class="fas fa-shield-alt mr-1"></i> End-to-end Encrypted</span>
                    <a href="#" class="hover:text-indigo-400 transition">Request Access?</a>
                </div>
            </div>
        </div>
    </div>

    <div id="main-platform" class="platform-hidden flex flex-col h-screen">
