<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-RefinedTPP | Refined-TPP Data Collaborative Processing Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 自定义滚动条，让界面更精致 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans overflow-hidden text-gray-800">

    <nav class="bg-white border-b px-8 py-3 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center space-x-3">
            <img src="assets/Logo.png" class="w-9 h-9 object-contain rounded-lg" alt="Platform Logo">
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Chat-RefinedTPP <span class="text-indigo-600">v1.0</span></h1>
                <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">Research Edition</p>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-sm">
            <a href="#" class="text-gray-500 hover:text-indigo-600 transition">项目文档</a>
            <a href="https://github.com" target="_blank" class="bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition flex items-center">
                <i class="fab fa-github mr-2"></i> GitHub
            </a>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        
        <section class="w-3/5 p-6 flex flex-col border-r bg-white relative">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-lg font-bold text-slate-800 mb-1">数据提交区</h2>
                    <div class="flex items-center space-x-2">
                        <span class="text-xs text-slate-400">加载示例数据:</span>
                        <button onclick="loadExample('clinical')" class="text-[11px] bg-blue-50 text-blue-600 px-3 py-1 rounded-md border border-blue-100 hover:bg-blue-600 hover:text-white transition">🏥 医疗文本</button>
                        <button onclick="loadExample('sales')" class="text-[11px] bg-emerald-50 text-emerald-600 px-3 py-1 rounded-md border border-emerald-100 hover:bg-emerald-600 hover:text-white transition">📊 结构化报表</button>
                    </div>
                </div>
                <button class="text-xs text-indigo-600 hover:underline"><i class="fas fa-trash-alt mr-1"></i> 清空输入</button>
            </div>
            
            <div class="flex-1 relative group">
                <textarea id="dataInput"
                    placeholder="在此粘贴原始数据（CSV, JSON, 或自由文本）..." 
                    class="w-full h-full p-6 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-50 focus:border-indigo-400 focus:outline-none font-mono text-sm leading-relaxed transition-all resize-none bg-slate-50/50 group-hover:bg-white"
                ></textarea>
                <div class="absolute bottom-4 right-4 text-[10px] text-slate-300 font-mono">UTF-8 Supported</div>
            </div>

            <div class="mt-4 flex items-center space-x-4">
                <button class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                    提交数据至 Agent <i class="fas fa-bolt ml-2 text-indigo-200"></i>
                </button>
                <button class="px-6 py-4 border-2 border-slate-100 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                    <i class="fas fa-file-upload"></i>
                </button>
            </div>
        </section>

        <section class="w-2/5 flex flex-col bg-slate-50/50">
            <div class="px-6 py-4 bg-white/80 backdrop-blur-md border-b flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <div class="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white shadow-md">
                            <i class="fas fa-robot text-lg"></i>
                        </div>
                        <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-green-500 border-2 border-white rounded-full animate-pulse"></div>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-700">Agent Assistant</p>
                        <p class="text-[10px] text-green-600 font-medium">后端服务器已就绪</p>
                    </div>
                </div>
            </div>
            
            <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="flex items-start space-x-3">
                    <div class="flex-1 bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-sm text-slate-600 leading-relaxed">
                        你好！请在左侧输入你的原始数据，我可以帮你进行**清洗、实体提取或生成可视化分析**。
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white border-t">
                <div class="relative group">
                    <input type="text" 
                           placeholder="给 Agent 下达指令..." 
                           class="w-full pl-5 pr-14 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all">
                    <button class="absolute right-2 top-2 p-3 bg-indigo-600 text-white rounded-xl shadow-md hover:bg-indigo-700 transition">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t py-4 px-8 flex justify-between items-center text-[11px] text-slate-400">
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2">
                <span class="font-bold text-slate-600">Development Team:</span>
                <span>Haojie Lu Lab (Fudan University)</span>
            </div>
            <div class="h-3 w-px bg-slate-200"></div>
            <div class="flex items-center">
               <span class="text-slate-400 font-medium mr-2">Developed and Maintained by:</span>
               <span class="text-indigo-600 font-semibold hover:text-indigo-800 transition cursor-default tracking-tight">
                   Haoru Song <span class="text-slate-300 font-light mx-1">|</span> 宋昊儒
                <span>
            </div>
        </div>
        
        <div class="flex items-center space-x-6">
            <button onclick="copyCitation()" class="group flex items-center hover:text-indigo-600 transition">
                <i class="fas fa-quote-left mr-1.5 text-slate-300 group-hover:text-indigo-400"></i> How to cite this platform (Citation)
            </button>
            <a href="#" class="hover:text-slate-600 flex items-center"><i class="fas fa-envelope mr-1"></i> Contact us</a>
        </div>
    </footer>

    <script>
        // 示例数据配置
        const examples = {
            clinical: "患者编号: #0042\n体温: 38.5°C\n诊断结果: 急性上呼吸道感染\n建议方案: 建议居家休息，多饮水，必要时服用布洛芬。",
            sales: "id,product,price,quantity\n1,MacBook Air,999,5\n2,iPhone 15,799,12\n3,AirPods Pro,249,25"
        };

        function loadExample(type) {
            document.getElementById('dataInput').value = examples[type];
        }

        function copyCitation() {
            const citation = "@article{agentflow2026,\n  author = {Your Name and Team},\n  title = {AgentFlow: A Data Agent Platform},\n  journal = {Project Github},\n  year = {2026}\n}";
            navigator.clipboard.writeText(citation);
            alert("BibTeX 引用已复制到剪贴板！");
        }
    </script>
</body>
</html>
